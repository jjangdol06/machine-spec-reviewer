<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>ABB 로봇 + A/C축 포지셔너 시뮬레이터</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #1a1d23; color: #e6e8eb; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
  #app { display: flex; height: 100vh; width: 100vw; }
  #viewport { flex: 1; position: relative; }
  #panel {
    width: 360px; background: #21252b; border-left: 1px solid #2f343c;
    padding: 14px; overflow-y: auto; font-size: 13px;
  }
  h2 { margin: 0 0 10px 0; font-size: 16px; color: #ff6b35; letter-spacing: 0.5px; }
  h3 { margin: 16px 0 8px 0; font-size: 13px; color: #a0c4ff; text-transform: uppercase; letter-spacing: 0.8px;
       border-bottom: 1px solid #2f343c; padding-bottom: 4px; }
  .row { display: flex; align-items: center; margin: 6px 0; gap: 8px; }
  .row label { width: 60px; color: #b8bcc4; font-size: 12px; }
  .row input[type=range] { flex: 1; accent-color: #ff6b35; }
  .row .value { width: 56px; text-align: right; font-family: 'Consolas', monospace;
                font-size: 12px; color: #ffd166; }
  select, button {
    background: #2f343c; color: #e6e8eb; border: 1px solid #3d434c;
    padding: 6px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
  }
  select:hover, button:hover { background: #3d434c; }
  button.primary { background: #ff6b35; border-color: #ff6b35; color: #fff; font-weight: 600; }
  button.primary:hover { background: #ff8255; }
  .button-row { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
  .info-box {
    background: #1a1d23; border: 1px solid #2f343c; border-radius: 4px;
    padding: 8px; font-family: 'Consolas', monospace; font-size: 11px; line-height: 1.6;
  }
  .info-box .lbl { color: #a0c4ff; display: inline-block; width: 28px; }
  .info-box .v { color: #ffd166; }
  .checkbox-row { display: flex; align-items: center; gap: 6px; margin: 4px 0; font-size: 12px; }
  #status { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6);
            padding: 6px 12px; border-radius: 4px; font-size: 12px; z-index: 10; }
  #status.warn { background: rgba(220,80,40,0.85); }
  #status.ok { background: rgba(40,150,80,0.85); }
  .legend {
    position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6);
    padding: 8px 12px; border-radius: 4px; font-size: 11px; z-index: 10; line-height: 1.6;
  }
  .legend .swatch { display: inline-block; width: 12px; height: 12px; border-radius: 2px;
                    vertical-align: middle; margin-right: 6px; }
</style>
</head>
<body>
<div id="app">
  <div id="viewport">
    <div id="status">대기중...</div>
    <div class="legend">
      <div><span class="swatch" style="background:#ff4444"></span>X축</div>
      <div><span class="swatch" style="background:#44ff44"></span>Y축</div>
      <div><span class="swatch" style="background:#4488ff"></span>Z축</div>
      <div><span class="swatch" style="background:#ffd166"></span>TCP</div>
      <div><span class="swatch" style="background:rgba(160,196,255,0.25);border:1px solid #a0c4ff"></span>작업 영역</div>
    </div>
  </div>
  <div id="panel">
    <h2>ABB 로봇 + A/C축 포지셔너</h2>

    <h3>장비 설정</h3>
    <div class="row">
      <label>로봇</label>
      <select id="robotModel" style="flex:1">
        <option value="IRB2600">IRB 2600-12/1.65 (12kg, 1.65m)</option>
        <option value="IRB4600" selected>IRB 4600-60/2.05 (60kg, 2.05m)</option>
        <option value="IRB6700">IRB 6700-200/2.60 (200kg, 2.60m)</option>
        <option value="IRB7600">IRB 7600-500/2.55 (500kg, 2.55m)</option>
      </select>
    </div>
    <div class="row">
      <label>거리</label>
      <input type="number" id="robotDistance" min="500" max="5000" step="50" value="2200" style="flex:1; background:#2f343c; color:#e6e8eb; border:1px solid #3d434c; padding:4px 8px; border-radius:4px; font-family:'Consolas',monospace"/>
      <span class="value" id="robotDistanceVal">mm</span>
    </div>
    <div class="row">
      <label>테이블⌀</label>
      <input type="number" id="tableDia" min="100" max="3000" step="10" value="1000" style="flex:1; background:#2f343c; color:#e6e8eb; border:1px solid #3d434c; padding:4px 8px; border-radius:4px; font-family:'Consolas',monospace"/>
      <span class="value" id="tableDiaV">mm</span>
    </div>
    <div class="row">
      <label>스트로크</label>
      <input type="number" id="wsX" min="100" max="5000" step="50" value="1500" title="X (전후, mm)" style="flex:1; min-width:0; background:#2f343c; color:#e6e8eb; border:1px solid #3d434c; padding:4px 6px; border-radius:4px; font-family:'Consolas',monospace; font-size:11px"/>
      <input type="number" id="wsY" min="100" max="5000" step="50" value="1500" title="Y (높이, mm)" style="flex:1; min-width:0; background:#2f343c; color:#e6e8eb; border:1px solid #3d434c; padding:4px 6px; border-radius:4px; font-family:'Consolas',monospace; font-size:11px"/>
      <input type="number" id="wsZ" min="100" max="5000" step="50" value="1500" title="Z (좌우, mm)" style="flex:1; min-width:0; background:#2f343c; color:#e6e8eb; border:1px solid #3d434c; padding:4px 6px; border-radius:4px; font-family:'Consolas',monospace; font-size:11px"/>
    </div>
    <div style="font-size:10px; color:#80858f; margin:-4px 0 6px 70px">X × Y × Z (mm), C-테이블 중심 (0,0,0)</div>

    <h3>로봇 축 (J1~J6)</h3>
    <div class="row"><label>J1</label><input type="range" id="j1" min="-180" max="180" step="1" value="0"/><span class="value" id="j1v">0°</span></div>
    <div class="row"><label>J2</label><input type="range" id="j2" min="-90" max="120" step="1" value="-30"/><span class="value" id="j2v">-30°</span></div>
    <div class="row"><label>J3</label><input type="range" id="j3" min="-180" max="80" step="1" value="40"/><span class="value" id="j3v">40°</span></div>
    <div class="row"><label>J4</label><input type="range" id="j4" min="-200" max="200" step="1" value="0"/><span class="value" id="j4v">0°</span></div>
    <div class="row"><label>J5</label><input type="range" id="j5" min="-120" max="120" step="1" value="60"/><span class="value" id="j5v">60°</span></div>
    <div class="row"><label>J6</label><input type="range" id="j6" min="-360" max="360" step="1" value="0"/><span class="value" id="j6v">0°</span></div>

    <h3>포지셔너 (A/C축)</h3>
    <div class="row"><label>A축</label><input type="range" id="axisA" min="-120" max="120" step="1" value="0"/><span class="value" id="axisAv">0°</span></div>
    <div class="row"><label>C축</label><input type="range" id="axisC" min="-360" max="360" step="1" value="0"/><span class="value" id="axisCv">0°</span></div>

    <h3>TCP 위치 (월드 좌표)</h3>
    <div class="info-box" id="tcpInfo">
      <span class="lbl">X:</span><span class="v" id="tcpX">0.000</span> m<br/>
      <span class="lbl">Y:</span><span class="v" id="tcpY">0.000</span> m<br/>
      <span class="lbl">Z:</span><span class="v" id="tcpZ">0.000</span> m<br/>
      <span class="lbl">RX:</span><span class="v" id="tcpRX">0.0</span>° &nbsp;
      <span class="lbl">RY:</span><span class="v" id="tcpRY">0.0</span>° &nbsp;
      <span class="lbl">RZ:</span><span class="v" id="tcpRZ">0.0</span>°<br/>
      <span class="lbl">D:</span><span class="v" id="tcpDist">0.000</span> m (원점→TCP)
    </div>

    <h3>표시 옵션</h3>
    <div class="checkbox-row"><input type="checkbox" id="showWorkspace" checked/><label for="showWorkspace">작업 영역 (도달 가능 반경)</label></div>
    <div class="checkbox-row"><input type="checkbox" id="showFrame" checked/><label for="showFrame">TCP 좌표계 표시</label></div>
    <div class="checkbox-row"><input type="checkbox" id="showTrail"/><label for="showTrail">TCP 궤적 표시</label></div>
    <div class="checkbox-row"><input type="checkbox" id="showCollisionZone" checked/><label for="showCollisionZone">충돌 경고 영역 (포지셔너)</label></div>
    <div class="checkbox-row"><input type="checkbox" id="showWorkingStroke" checked/><label for="showWorkingStroke">작업 스트로크 박스</label></div>
    <div class="button-row">
      <button id="clearTrail">궤적 초기화</button>
    </div>

    <h3>경로 시뮬레이션</h3>
    <div class="button-row">
      <button id="presetHome">홈 자세</button>
      <button id="presetReady">준비 자세</button>
      <button id="presetWeld">용접 시작</button>
    </div>
    <div class="button-row">
      <button id="recordPose">현재 자세 저장</button>
      <button id="clearPath">경로 초기화</button>
    </div>
    <div class="button-row">
      <button class="primary" id="playPath">▶ 경로 재생</button>
      <button id="stopPath">■ 정지</button>
    </div>
    <div class="row">
      <label>속도</label>
      <input type="range" id="playSpeed" min="0.2" max="3" step="0.1" value="1"/>
      <span class="value" id="playSpeedV">1.0×</span>
    </div>
    <div class="info-box" id="pathInfo" style="margin-top:6px">
      저장된 자세: <span class="v" id="poseCount">0</span>개
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ============================================================
//  OrbitControls (간소화 버전 - 외부 의존성 없이 동작)
// ============================================================
class OrbitControls {
  constructor(camera, dom) {
    this.camera = camera; this.dom = dom;
    this.target = new THREE.Vector3(0, 0.5, 0);
    this.spherical = new THREE.Spherical(5, Math.PI/3, Math.PI/4);
    this.update();
    this._dragging = false; this._panning = false;
    this._last = { x:0, y:0 };
    dom.addEventListener('mousedown', e => {
      this._dragging = true;
      this._panning = (e.button === 2 || e.shiftKey);
      this._last = { x:e.clientX, y:e.clientY };
    });
    window.addEventListener('mouseup', () => { this._dragging = false; });
    window.addEventListener('mousemove', e => this._onMove(e));
    dom.addEventListener('wheel', e => {
      e.preventDefault();
      this.spherical.radius *= (1 + e.deltaY * 0.001);
      this.spherical.radius = Math.max(0.5, Math.min(20, this.spherical.radius));
      this.update();
    }, { passive: false });
    dom.addEventListener('contextmenu', e => e.preventDefault());
  }
  _onMove(e) {
    if (!this._dragging) return;
    const dx = e.clientX - this._last.x;
    const dy = e.clientY - this._last.y;
    this._last = { x:e.clientX, y:e.clientY };
    if (this._panning) {
      const right = new THREE.Vector3().setFromMatrixColumn(this.camera.matrix, 0);
      const up    = new THREE.Vector3().setFromMatrixColumn(this.camera.matrix, 1);
      const f = this.spherical.radius * 0.0015;
      this.target.addScaledVector(right, -dx*f).addScaledVector(up, dy*f);
    } else {
      this.spherical.theta -= dx * 0.005;
      this.spherical.phi   -= dy * 0.005;
      this.spherical.phi = Math.max(0.05, Math.min(Math.PI - 0.05, this.spherical.phi));
    }
    this.update();
  }
  update() {
    const offset = new THREE.Vector3().setFromSpherical(this.spherical);
    this.camera.position.copy(this.target).add(offset);
    this.camera.lookAt(this.target);
  }
}

// ============================================================
//  ABB 로봇 사양 — ABB 공식 데이터시트 기반 (단위: m, °)
//  * 링크 길이는 공식 도면(Robot dimensions)에서 추출
//  * 조인트 범위(limits)는 datasheet의 Working range
//  * 색상: ABB Orange (Pantone 158C ≈ #ff6b1f)
//  reference: https://new.abb.com/products/robotics/industrial-robots
// ============================================================
const ABB_ORANGE = 0xff6b1f;
const ROBOT_SPECS = {
  // IRB 2600-12/1.65  (12kg payload, 1.65m reach) — datasheet 3HAC033453-001
  IRB2600: {
    name: 'IRB 2600-12/1.65', payload: 12, reach: 1.65,
    d1: 0.445, a1: 0.150, a2: 0.700, d4: 0.795, d6: 0.085,
    limits: { j1:[-180,180], j2:[-95,155], j3:[-180,75], j4:[-400,400], j5:[-120,120], j6:[-400,400] },
    color: ABB_ORANGE,
  },
  // IRB 4600-60/2.05 (60kg payload, 2.05m reach) — datasheet 3HAC032885-001
  IRB4600: {
    name: 'IRB 4600-60/2.05', payload: 60, reach: 2.05,
    d1: 0.495, a1: 0.175, a2: 0.900, d4: 0.960, d6: 0.135,
    limits: { j1:[-180,180], j2:[-90,150], j3:[-180,75], j4:[-400,400], j5:[-125,120], j6:[-400,400] },
    color: ABB_ORANGE,
  },
  // IRB 6700-200/2.60 (200kg payload, 2.60m reach) — datasheet 3HAC042927-001
  IRB6700: {
    name: 'IRB 6700-200/2.60', payload: 200, reach: 2.60,
    d1: 0.780, a1: 0.320, a2: 1.125, d4: 1.142, d6: 0.200,
    limits: { j1:[-170,170], j2:[-65,85], j3:[-180,70], j4:[-300,300], j5:[-130,130], j6:[-360,360] },
    color: ABB_ORANGE,
  },
  // IRB 7600-500/2.55 (500kg payload, 2.55m reach) — datasheet 3HAC022031-001
  IRB7600: {
    name: 'IRB 7600-500/2.55', payload: 500, reach: 2.55,
    d1: 0.780, a1: 0.410, a2: 1.075, d4: 1.392, d6: 0.250,
    limits: { j1:[-180,180], j2:[-60,85], j3:[-180,60], j4:[-300,300], j5:[-100,100], j6:[-360,360] },
    color: ABB_ORANGE,
  },
};

// ============================================================
//  씬 / 카메라 / 렌더러 초기화
// ============================================================
const viewport = document.getElementById('viewport');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(viewport.clientWidth, viewport.clientHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x0e1015);
viewport.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0e1015, 12, 28);

const camera = new THREE.PerspectiveCamera(45, viewport.clientWidth/viewport.clientHeight, 0.05, 100);
const controls = new OrbitControls(camera, renderer.domElement);
controls.spherical.set(6, Math.PI/3, Math.PI/4);
controls.target.set(0, 0.6, 0);
controls.update();

// 조명
scene.add(new THREE.AmbientLight(0xffffff, 0.45));
const keyLight = new THREE.DirectionalLight(0xffffff, 0.95);
keyLight.position.set(5, 8, 5); keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.left = -6; keyLight.shadow.camera.right = 6;
keyLight.shadow.camera.top = 6;   keyLight.shadow.camera.bottom = -6;
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xa0c4ff, 0.3);
fillLight.position.set(-5, 4, -5); scene.add(fillLight);

// 바닥
const floorMat = new THREE.MeshStandardMaterial({ color: 0x2a2e36, roughness: 0.9, metalness: 0.1 });
const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), floorMat);
floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);
const grid = new THREE.GridHelper(20, 40, 0x444a55, 0x2a2e36);
grid.material.opacity = 0.5; grid.material.transparent = true; scene.add(grid);

// 월드 좌표축 표시 (작게)
const worldAxes = new THREE.AxesHelper(0.5);
worldAxes.position.set(0, 0.001, 0);
scene.add(worldAxes);

// ============================================================
//  포지셔너: 베드형 A축 + 상단 C축 턴테이블
//  좌표계: Y-up
//  A축 = X축 회전 (베드 틸트). C축 = 베드 로컬 Y축 회전 (턴테이블).
//  구조: 바닥베이스 → 좌우 베어링 서포트 → A축 베드(슬래브) → C축 디스크
// ============================================================
const positionerGroup = new THREE.Group();
scene.add(positionerGroup);

const positionerBaseMat = new THREE.MeshStandardMaterial({ color: 0x4a5260, roughness: 0.6, metalness: 0.4 });
const positionerArmMat  = new THREE.MeshStandardMaterial({ color: 0x6b7280, roughness: 0.5, metalness: 0.5 });
const turntableMat      = new THREE.MeshStandardMaterial({ color: 0xc8ccd4, roughness: 0.3, metalness: 0.8 });
const cradleMat         = new THREE.MeshStandardMaterial({ color: 0x5b6370, roughness: 0.5, metalness: 0.5 });

// --- 치수 (m) ---
//   A축 회전축 = X축 → 서포트는 X 양 끝, 회전봉도 X 방향
const BASE_H = 0.10;
const SUP_W  = 0.12, SUP_H = 0.36, SUP_D = 0.22;     // 서포트 두께(X)/높이/깊이(Z)
const BED_H  = 0.06;
const BED_D  = 1.00;                                  // Z 방향 깊이 (디스크 수용)
const DISK_H = 0.08;
const A_PIVOT_Y = BASE_H + SUP_H/2;                   // A축 회전축 높이
const SHAFT_R = 0.04;
const BASE_SUP_X = 0.65;                              // 기본 서포트 X 위치 (디스크 지름에 따라 갱신)

// 1) 바닥 베이스 (서포트 폭 수용 위해 넓게)
const floorBase = new THREE.Mesh(
  new THREE.BoxGeometry(2*BASE_SUP_X + SUP_W + 0.20, BASE_H, BED_D + 0.20),
  positionerBaseMat
);
floorBase.position.y = BASE_H/2;
floorBase.castShadow = true; floorBase.receiveShadow = true;
positionerGroup.add(floorBase);

// 2) 좌우 베어링 서포트 (X 양 끝, A축 회전축을 지지)
const supL = new THREE.Mesh(new THREE.BoxGeometry(SUP_W, SUP_H, SUP_D), cradleMat);
supL.position.set(+BASE_SUP_X, BASE_H + SUP_H/2, 0);
supL.castShadow = true; supL.receiveShadow = true;
positionerGroup.add(supL);
const supR = supL.clone();
supR.position.x = -BASE_SUP_X;
positionerGroup.add(supR);

// 3) A축 회전축 (X 방향 봉) — 양 서포트를 관통
const aAxisShaft = new THREE.Mesh(
  new THREE.CylinderGeometry(SHAFT_R, SHAFT_R, 2*BASE_SUP_X + SUP_W, 24),
  new THREE.MeshStandardMaterial({ color: 0x303540, roughness: 0.3, metalness: 0.8 })
);
aAxisShaft.rotation.z = Math.PI/2;                    // 기본 Y축 → X축으로 회전
aAxisShaft.position.y = A_PIVOT_Y;
positionerGroup.add(aAxisShaft);

// 4) A축 베드 그룹 (X축 주위로 틸트)
const aAxisGroup = new THREE.Group();
aAxisGroup.position.y = A_PIVOT_Y;
positionerGroup.add(aAxisGroup);

// 베드 슬래브 — 양 서포트 안쪽 면 사이 (서포트와 겹치지 않도록 클리어런스)
const BED_CLEAR = 0.01;                               // 양쪽 10mm 갭
const baseBedW = 2*BASE_SUP_X - SUP_W - 2*BED_CLEAR;
const bed = new THREE.Mesh(
  new THREE.BoxGeometry(baseBedW, BED_H, BED_D),
  positionerArmMat
);
bed.position.y = 0;
bed.castShadow = true; bed.receiveShadow = true;
aAxisGroup.add(bed);


// 5) C축 턴테이블 그룹 (베드 상면 위)
//    cAxisGroup 원점 = 디스크 상단 (기존 디스크 오프셋 -0.04 그대로 동작)
const cAxisGroup = new THREE.Group();
cAxisGroup.position.y = BED_H/2 + DISK_H;
aAxisGroup.add(cAxisGroup);

// 테이블 부품을 묶어 한꺼번에 스케일 (지름 조절용)
// 기준 디스크 지름 = 1.0m (반지름 0.5m). scale.x/z = tableDia / 1.0
const tableScaleGroup = new THREE.Group();
cAxisGroup.add(tableScaleGroup);

// 턴테이블 디스크
const tableDisk = new THREE.Mesh(

// ============================================================
//  ABB 로봇 모델 (파라메트릭)
//  6축 (J1: base Z회전, J2: shoulder Y회전, J3: elbow Y회전,
//       J4: forearm X회전, J5: wrist Y회전, J6: tool X회전)
//  단순화된 운동학 - 시각적 표현 목적
// ============================================================
const robotGroup = new THREE.Group();
scene.add(robotGroup);

const robotMat       = (color) => new THREE.MeshStandardMaterial({ color, roughness: 0.5, metalness: 0.5 });
const robotJointMat  = new THREE.MeshStandardMaterial({ color: 0x303540, roughness: 0.3, metalness: 0.8 });

let robotParts = null;
let currentSpec = null;

function buildRobot(specKey) {
  // 기존 로봇 제거
  while (robotGroup.children.length) {
    const child = robotGroup.children[0];
    robotGroup.remove(child);
    child.traverse(o => { if (o.geometry) o.geometry.dispose(); });
  }
  const spec = ROBOT_SPECS[specKey];
  currentSpec = spec;
  const orange = robotMat(spec.color);
  const dark   = robotMat(0x2c3038);

  // 베이스 (고정)
  const base = new THREE.Mesh(
    new THREE.CylinderGeometry(0.28, 0.32, 0.18, 32), dark
  );
  base.position.y = 0.09;
  base.castShadow = true; base.receiveShadow = true;
  robotGroup.add(base);

  // J1: 회전 베이스 (Z축 회전) - 중심 기둥
  const j1Group = new THREE.Group();
  j1Group.position.y = 0.18;
  robotGroup.add(j1Group);

  const j1Body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.22, 0.26, spec.d1 - 0.18, 24), orange
  );
  j1Body.position.y = (spec.d1 - 0.18)/2;
  j1Body.castShadow = true;
  j1Group.add(j1Body);

  // J1 베어링/조인트 표시
  const j1Joint = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.2, 0.05, 24), robotJointMat
  );
  j1Joint.position.y = 0.025;
  j1Group.add(j1Joint);

  // J2: 어깨 (Y축 회전) - J1 상단에 위치
  const j2Group = new THREE.Group();
  j2Group.position.set(spec.a1, spec.d1 - 0.18, 0);
  j1Group.add(j2Group);

  // J2 조인트 (수평 봉)
  const j2Joint = new THREE.Mesh(
    new THREE.CylinderGeometry(0.13, 0.13, 0.36, 24), robotJointMat
  );
  j2Joint.rotation.x = Math.PI/2;
  j2Group.add(j2Joint);

  // 상박 (J2-J3 사이 링크) - J2 그룹 안에 배치, +X 방향으로 a2 길이
  const upperArm = new THREE.Mesh(
    new THREE.BoxGeometry(spec.a2, 0.18, 0.18), orange
  );
  upperArm.position.set(spec.a2/2, 0, 0);
  upperArm.castShadow = true;
  j2Group.add(upperArm);

  // J3: 엘보우 (Y축 회전) - 상박 끝에 위치
  const j3Group = new THREE.Group();
  j3Group.position.set(spec.a2, 0, 0);
  j2Group.add(j3Group);

  const j3Joint = new THREE.Mesh(
    new THREE.CylinderGeometry(0.11, 0.11, 0.32, 24), robotJointMat
  );
  j3Joint.rotation.x = Math.PI/2;
  j3Group.add(j3Joint);

  // 전박 분리: J3 직후 짧은 부분 + J4 회전축 + 손목
  // 전박 본체 (J3-J4 사이) - +X 방향으로 d4 길이
  const forearm = new THREE.Mesh(
    new THREE.BoxGeometry(spec.d4, 0.14, 0.14), orange
  );
  forearm.position.set(spec.d4/2, 0, 0);
  forearm.castShadow = true;
  j3Group.add(forearm);

  // J4: 전박 롤 (X축 회전) - J3 다음
  const j4Group = new THREE.Group();
  j4Group.position.set(spec.d4, 0, 0);
  j3Group.add(j4Group);

  // J4 표시 (회전 디스크)
  const j4Joint = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08, 0.08, 0.12, 16), robotJointMat
  );
  j4Joint.rotation.z = Math.PI/2;
  j4Group.add(j4Joint);

  // J5: 손목 피치 (Y축 회전)
  const j5Group = new THREE.Group();
  j5Group.position.set(0.05, 0, 0);
  j4Group.add(j5Group);

  const j5Joint = new THREE.Mesh(
    new THREE.CylinderGeometry(0.07, 0.07, 0.16, 16), robotJointMat
  );
  j5Joint.rotation.x = Math.PI/2;
  j5Group.add(j5Joint);

  // J6: 툴 롤 (X축 회전)
  const j6Group = new THREE.Group();
  j6Group.position.set(0.04, 0, 0);
  j5Group.add(j6Group);

  // === J6 끝단: 플랜지 + 브라켓 + 수직 결합 모듈 (TCP가 바닥 향함) ===
  // 좌표계: j6Group 로컬, +X = J6 회전축, +Y = 위
  // 모듈은 j6 로컬 -Y로 매달려 끝(TCP)이 바닥을 향함.
  // 브라켓 = 베이스(플랜지 결합) + 수평 암(+X) + 수직 드롭 플레이트(-Y).
  // 모듈의 원기둥 옆면이 드롭 플레이트 측면에 클램프로 결합.
  const FLANGE_X    = 0.012;
  const BR_BASE_THK = 0.012;
  const BR_BASE_W   = 0.13;
  const BR_BASE_X0  = FLANGE_X + 0.012;
  const BR_ARM_LEN  = 0.16;
  const BR_ARM_THK  = 0.012;
  const BR_ARM_W    = 0.10;
  const BR_ARM_Y    = 0;                          // 플랜지 중심 높이
  const BR_DROP_LEN = 0.18;                       // 드롭 플레이트 수직 길이
  const BR_DROP_THK = 0.012;
  const BR_DROP_W   = 0.10;
  const MOD_R       = 0.04;
  const MOD_LEN     = 0.22;
  const MOD_TIP_LEN = 0.06;

  const MOD_X_CTR   = BR_BASE_X0 + BR_BASE_THK + BR_ARM_LEN - 0.01;
  const MOD_Y_CTR   = BR_ARM_Y - BR_ARM_THK/2 - BR_DROP_LEN/2;
  const DROP_Z      = -(MOD_R + BR_DROP_THK/2);   // 모듈 옆에 드롭 플레이트

  // J6 플랜지
  const flange = new THREE.Mesh(
    new THREE.CylinderGeometry(0.055, 0.06, 0.01, 24),
    new THREE.MeshStandardMaterial({ color: 0xc0c4cc, roughness: 0.3, metalness: 0.85 })
  );
  flange.rotation.z = Math.PI/2;
  flange.position.x = FLANGE_X;
  j6Group.add(flange);

  // 브라켓
  const bracketMat = new THREE.MeshStandardMaterial({ color: 0x3a4250, roughness: 0.55, metalness: 0.55 });

  // 베이스 플레이트 — J6 플랜지에 볼트 체결
  const bracketBase = new THREE.Mesh(
    new THREE.BoxGeometry(BR_BASE_THK, BR_BASE_W, BR_BASE_W), bracketMat
  );
  bracketBase.position.x = BR_BASE_X0 + BR_BASE_THK/2;
  bracketBase.castShadow = true;
  j6Group.add(bracketBase);

  // 수평 암 — 모듈 위치까지 +X로 뻗음
  const bracketArm = new THREE.Mesh(
    new THREE.BoxGeometry(BR_ARM_LEN, BR_ARM_THK, BR_ARM_W), bracketMat
  );
  bracketArm.position.set(BR_BASE_X0 + BR_BASE_THK + BR_ARM_LEN/2, BR_ARM_Y, 0);
  bracketArm.castShadow = true;
  j6Group.add(bracketArm);

  // 수직 드롭 플레이트 — 모듈 옆면이 결합되는 면 (X-Y 평면, 노멀 +Z)
  const bracketDrop = new THREE.Mesh(
    new THREE.BoxGeometry(BR_DROP_W, BR_DROP_LEN, BR_DROP_THK), bracketMat
  );
  bracketDrop.position.set(MOD_X_CTR, MOD_Y_CTR, DROP_Z);
  bracketDrop.castShadow = true;
  j6Group.add(bracketDrop);

  // 모듈 (예: 용접 토치 / 그라인더) — 수직 매달림, 끝이 바닥 향함
  const moduleGroup = new THREE.Group();
  moduleGroup.position.set(MOD_X_CTR, MOD_Y_CTR, 0);
  j6Group.add(moduleGroup);

  const moduleBody = new THREE.Mesh(
    new THREE.CylinderGeometry(MOD_R, MOD_R, MOD_LEN, 24),
    new THREE.MeshStandardMaterial({ color: 0x202428, roughness: 0.4, metalness: 0.75 })
  );
  // 기본 실린더는 Y축 정렬 — 그대로 사용 (수직)
  moduleBody.castShadow = true;
  moduleGroup.add(moduleBody);

  // 결합 클램프 밴드 — 원기둥 둘레를 감아 드롭 플레이트와 체결
  const clampMat = new THREE.MeshStandardMaterial({ color: 0x808890, roughness: 0.3, metalness: 0.85 });
  for (const y of [-MOD_LEN/2 + 0.04, MOD_LEN/2 - 0.04]) {
    const clamp = new THREE.Mesh(new THREE.TorusGeometry(MOD_R + 0.004, 0.006, 8, 24), clampMat);
    clamp.rotation.x = Math.PI/2;        // 토러스 평면을 X-Z로 (수직 원기둥 둘레)
    clamp.position.y = y;
    moduleGroup.add(clamp);
  }

  // 모듈 끝단 팁 (-Y 방향, 바닥 지향)
  const moduleTip = new THREE.Mesh(
    new THREE.ConeGeometry(0.022, MOD_TIP_LEN, 12),
    new THREE.MeshStandardMaterial({ color: 0xffd166, emissive: 0x553300 })
  );
  moduleTip.rotation.x = Math.PI;        // 콘 기본은 +Y, 뒤집어서 -Y 향함
  moduleTip.position.y = -MOD_LEN/2 - MOD_TIP_LEN/2;
  moduleGroup.add(moduleTip);

  // TCP — 모듈 팁 끝(바닥 방향)
  const tcpAnchor = new THREE.Object3D();
  tcpAnchor.position.set(MOD_X_CTR, MOD_Y_CTR - MOD_LEN/2 - MOD_TIP_LEN, 0);
  j6Group.add(tcpAnchor);

  // TCP 좌표계
  const tcpFrame = new THREE.AxesHelper(0.18);
  tcpAnchor.add(tcpFrame);

  // TCP 마커
  const tcpDot = new THREE.Mesh(
    new THREE.SphereGeometry(0.022, 16, 12),
    new THREE.MeshBasicMaterial({ color: 0xffd166 })
  );
  tcpAnchor.add(tcpDot);

  robotParts = { j1Group, j2Group, j3Group, j4Group, j5Group, j6Group, tcpAnchor, tcpFrame };

  // 작업 영역 구 업데이트
  if (workspaceSphere) workspaceSphere.geometry.dispose();
  workspaceSphere.geometry = new THREE.SphereGeometry(spec.reach, 32, 16);
  workspaceSphere.position.copy(robotGroup.position);
  workspaceSphere.position.y = spec.d1;
}

// 작업 영역 표시 (도달 가능 반경 와이어프레임 구)

// 작업 스트로크 박스 (X×Y×Z, C-테이블 중심 = 상대좌표 0,0,0 기준)
// cAxisGroup에 부모 설정 → 테이블 회전/틸트와 함께 움직임
const wsEdges = new THREE.LineSegments(

cAxisGroup.add(wsEdges);

// 로봇 위치 (포지셔너로부터 거리)
let robotDistance = 2.2;
function updateRobotPosition() {
  robotGroup.position.set(robotDistance, 0, 0);
  robotGroup.rotation.y = Math.PI; // 로봇이 포지셔너를 바라보도록
  if (workspaceSphere && currentSpec) {
    workspaceSphere.position.set(robotDistance, currentSpec.d1, 0);

}

const trailPoints = [];
const trailMaxPoints = 500;
const trailGeom = new THREE.BufferGeometry();
trailGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(trailMaxPoints * 3), 3));
trailGeom.setDrawRange(0, 0);
const trailLine = new THREE.Line(
  trailGeom,
  new THREE.LineBasicMaterial({ color: 0xffd166, transparent: true, opacity: 0.85 })
);
trailLine.visible = false;
scene.add(trailLine);

function pushTrail(p) {
  if (trailPoints.length >= trailMaxPoints) trailPoints.shift();
  trailPoints.push(p.clone());
  const arr = trailGeom.attributes.position.array;
  for (let i = 0; i < trailPoints.length; i++) {
    arr[i*3]     = trailPoints[i].x;
    arr[i*3 + 1] = trailPoints[i].y;
    arr[i*3 + 2] = trailPoints[i].z;
  }
  trailGeom.attributes.position.needsUpdate = true;
  trailGeom.setDrawRange(0, trailPoints.length);
}

// ============================================================
//  현재 자세 상태
// ============================================================
const state = {
  j1: 0, j2: -30, j3: 40, j4: 0, j5: 60, j6: 0,
  axisA: 0, axisC: 0,
};

function applyState() {
  if (!robotParts) return;
  const r = robotParts;
  // 로봇: J1=Y축 회전(베이스), J2/J3=Z축 회전(피치), J4=X축 회전(롤),
  // J5=Z축 회전(피치), J6=X축 회전(롤)
  // Three.js 기본 좌표계는 Y-up이므로 J1은 Y회전
  // 로봇이 +Y(robotGroup) 180° 회전된 상태이므로
  // ABB 컨벤션(J2- = 어깨 뒤/위, J3+ = 팔꿈치 앞/아래)에 맞추기 위해
  // J2/J3 부호를 반전한다 (시각적으로 자연스러운 방향).
  r.j1Group.rotation.y = THREE.MathUtils.degToRad(state.j1);
  r.j2Group.rotation.z = THREE.MathUtils.degToRad(-state.j2);
  r.j3Group.rotation.z = THREE.MathUtils.degToRad(-state.j3);
  r.j4Group.rotation.x = THREE.MathUtils.degToRad(state.j4);
  r.j5Group.rotation.z = THREE.MathUtils.degToRad(state.j5);
  r.j6Group.rotation.x = THREE.MathUtils.degToRad(state.j6);

  // 포지셔너 (Three.js Y-up: Z up은 의미상이지만 실제 회전은
  // A축=X축 회전, C축은 자기 로컬 Y축 회전으로 매핑)
  aAxisGroup.rotation.x = THREE.MathUtils.degToRad(state.axisA);
  cAxisGroup.rotation.y = THREE.MathUtils.degToRad(state.axisC);
}

// ============================================================
//  TCP 위치/자세 계산 (월드 좌표) 및 거리/충돌 평가
// ============================================================
const _tcpPos = new THREE.Vector3();
const _tcpQuat = new THREE.Quaternion();
const _tcpScale = new THREE.Vector3();
const _tcpEuler = new THREE.Euler();

function computeTCP() {
  if (!robotParts) return null;
  robotParts.tcpAnchor.updateWorldMatrix(true, false);
  robotParts.tcpAnchor.matrixWorld.decompose(_tcpPos, _tcpQuat, _tcpScale);
  _tcpEuler.setFromQuaternion(_tcpQuat, 'XYZ');
  return {
    pos: _tcpPos.clone(),
    rot: _tcpEuler.clone(),
    distFromOrigin: _tcpPos.length(),
  };
}

const statusEl = document.getElementById('status');
function updateInfo() {
  const tcp = computeTCP();
  if (!tcp) return;
  document.getElementById('tcpX').textContent = tcp.pos.x.toFixed(3);
  document.getElementById('tcpY').textContent = tcp.pos.z.toFixed(3); // 화면 표시는 산업용 좌표(Z up)으로
  document.getElementById('tcpZ').textContent = tcp.pos.y.toFixed(3);
  document.getElementById('tcpRX').textContent = THREE.MathUtils.radToDeg(tcp.rot.x).toFixed(1);
  document.getElementById('tcpRY').textContent = THREE.MathUtils.radToDeg(tcp.rot.y).toFixed(1);
  document.getElementById('tcpRZ').textContent = THREE.MathUtils.radToDeg(tcp.rot.z).toFixed(1);
  document.getElementById('tcpDist').textContent = tcp.distFromOrigin.toFixed(3);

  // 충돌/도달 평가
  const reach = currentSpec ? currentSpec.reach : 2.5;
  const robotBaseTop = robotGroup.position.clone();
  robotBaseTop.y = currentSpec ? currentSpec.d1 : 0.5;
  const tcpToBase = tcp.pos.distanceTo(robotBaseTop);

  // 포지셔너와의 충돌 영역(원점 기준 0.95m 구)
  const tcpToPositioner = tcp.pos.length();

  if (tcpToBase > reach * 0.99) {
    statusEl.textContent = '⚠ 도달 한계 초과 (out of reach)';
    statusEl.className = 'warn';
  } else if (tcpToPositioner < 0.55) {
    statusEl.textContent = '⚠ 포지셔너 충돌 가능';
    statusEl.className = 'warn';
  } else if (tcpToBase > reach * 0.92) {
    statusEl.textContent = '⚠ 도달 한계 근접';
    statusEl.className = 'warn';
  } else {
    statusEl.textContent = `✓ 정상 동작 / 도달거리 ${tcpToBase.toFixed(2)}m / ${currentSpec.name}`;
    statusEl.className = 'ok';
  }

  if (showTrail.checked) pushTrail(tcp.pos);
}

function bindSlider(id, key, suffix='°', formatter=(v)=>v) {
  const el = document.getElementById(id);
  const val = document.getElementById(id+'v');
  el.value = state[key];
  val.textContent = formatter(state[key]) + suffix;
  el.addEventListener('input', () => {
    state[key] = parseFloat(el.value);
    val.textContent = formatter(state[key]) + suffix;
    applyState(); updateInfo();
  });
}
['j1','j2','j3','j4','j5','j6','axisA','axisC'].forEach(k => bindSlider(k, k));

// 데이터시트 limits를 J1~J6 슬라이더 min/max에 적용 + 현재값 클램프
function applyJointLimitsToSliders(spec) {
  if (!spec || !spec.limits) return;
  for (const k of ['j1','j2','j3','j4','j5','j6']) {
    const [lo, hi] = spec.limits[k];
    const el = document.getElementById(k);
    const val = document.getElementById(k+'v');
    el.min = lo; el.max = hi;
    if (state[k] < lo) state[k] = lo;
    if (state[k] > hi) state[k] = hi;
    el.value = state[k];
    val.textContent = state[k] + '°';
  }
}

// 테이블 지름 입력 (mm 단위, 기준 디스크 = 1000mm)
const tableDiaEl = document.getElementById('tableDia');
const tableDiaV = document.getElementById('tableDiaV');
function updatePositionerForDisk(mm) {
  // 디스크 지름이 커져도 서포트가 더 넓도록 동적 갱신
  const diskR = mm / 1000 / 2;
  const desiredSupX = Math.max(BASE_SUP_X, diskR + 0.15);   // 디스크 반지름 + 150mm 여유
  supL.position.x = +desiredSupX;
  supR.position.x = -desiredSupX;
  // 베드는 서포트 안쪽 면 사이로만 — 클리어런스 유지
  const newBedW = 2*desiredSupX - SUP_W - 2*BED_CLEAR;
  bed.scale.x = newBedW / baseBedW;
  aAxisShaft.scale.y = (2*desiredSupX + SUP_W) / (2*BASE_SUP_X + SUP_W);  // 봉은 z=π/2 회전 후라 geom-Y가 길이축
  floorBase.scale.x = (2*desiredSupX + SUP_W + 0.20) / (2*BASE_SUP_X + SUP_W + 0.20);
}
function setTableDiaMm(mm) {
  // 3D 씬과 라벨만 갱신 — 입력 필드의 value는 건드리지 않음 (커서/입력 보존)
  if (!Number.isFinite(mm)) return;
  const s = mm / 1000;
  tableScaleGroup.scale.set(s, 1, s);
  updatePositionerForDisk(mm);
  tableDiaV.textContent = `mm (${(mm/1000).toFixed(3)}m)`;
}
function clampTableDiaInput() {
  const min = parseFloat(tableDiaEl.min), max = parseFloat(tableDiaEl.max);
  let mm = parseFloat(tableDiaEl.value);
  if (!Number.isFinite(mm)) mm = 1000;
  mm = Math.max(min, Math.min(max, mm));
  tableDiaEl.value = mm;
  setTableDiaMm(mm);
}
// 타이핑 중: 부분 값으로도 미리보기 갱신, 단 필드 값은 보존
tableDiaEl.addEventListener('input', () => {
  const mm = parseFloat(tableDiaEl.value);
  if (Number.isFinite(mm)) setTableDiaMm(mm);
});
// 확정(blur/Enter): 한계 클램프하여 필드에 반영
tableDiaEl.addEventListener('change', clampTableDiaInput);
clampTableDiaInput();

function setRobotDistMm(mm) {

  robotDistVal.textContent = `mm (${robotDistance.toFixed(2)}m)`;

}
function clampRobotDistInput() {

  if (!Number.isFinite(mm)) mm = 2200;
  mm = Math.max(min, Math.min(max, mm));
  robotDistEl.value = mm;
  setRobotDistMm(mm);
}
robotDistEl.addEventListener('input', () => {
  const mm = parseFloat(robotDistEl.value);

// 작업 스트로크 (X×Y×Z mm, 바닥 기준)
const wsXEl = document.getElementById('wsX');
const wsYEl = document.getElementById('wsY');
const wsZEl = document.getElementById('wsZ');
function applyWorkingStroke() {
  const x = parseFloat(wsXEl.value);
  const y = parseFloat(wsYEl.value);
  const z = parseFloat(wsZEl.value);
  if (!Number.isFinite(x) || !Number.isFinite(y) || !Number.isFinite(z)) return;
  wsEdges.scale.set(x/1000, y/1000, z/1000);
  // C-테이블 중심 표면 = (0,0,0). 박스 바닥이 표면에 닿고 +Y로 뻗음.
  wsEdges.position.set(0, (y/1000)/2, 0);
}
function clampWsInput(el) {
  const min = parseFloat(el.min), max = parseFloat(el.max);
  let v = parseFloat(el.value);
  if (!Number.isFinite(v)) v = 1500;
  v = Math.max(min, Math.min(max, v));
  el.value = v;
  applyWorkingStroke();
}
[wsXEl, wsYEl, wsZEl].forEach(el => {
  el.addEventListener('input', applyWorkingStroke);
  el.addEventListener('change', () => clampWsInput(el));
});
applyWorkingStroke();

function setPose(p) {
  Object.assign(state, p);
  for (const k of Object.keys(p)) {

    if (el) { el.value = p[k]; val.textContent = p[k] + '°'; }

  applyState(); updateInfo();
}

// 경로 시뮬레이션
const path = [];
const poseCountEl = document.getElementById('poseCount');
function refreshPathInfo() { poseCountEl.textContent = path.length; }

document.getElementById('recordPose').addEventListener('click', () => {
  path.push({ ...state });
  refreshPathInfo();
});
document.getElementById('clearPath').addEventListener('click', () => {
  path.length = 0; refreshPathInfo();
});

let playing = false;
let playSpeed = 1;
const playSpeedEl = document.getElementById('playSpeed');
const playSpeedV = document.getElementById('playSpeedV');
playSpeedEl.addEventListener('input', () => {
  playSpeed = parseFloat(playSpeedEl.value);
  playSpeedV.textContent = playSpeed.toFixed(1) + '×';
});

document.getElementById('playPath').addEventListener('click', () => {
  if (path.length < 2) {
    alert('최소 2개의 자세를 저장해 주세요. ("현재 자세 저장" 버튼)');
    return;
  }
  playing = true;
  playPath();
});
document.getElementById('stopPath').addEventListener('click', () => {
  playing = false;
});

let playStart = 0;
let playSegment = 0;
function playPath() {
  if (!playing || path.length < 2) return;
  playSegment = 0;
  playStart = performance.now();
  const segDuration = 1500; // ms per segment at 1x speed

  function animate() {
    if (!playing) return;
    const now = performance.now();
    const elapsed = (now - playStart) * playSpeed;
    const segIdx = Math.floor(elapsed / segDuration);
    if (segIdx >= path.length - 1) {
      // 마지막 자세에 정지
      const last = path[path.length - 1];
      Object.assign(state, last);
      syncSlidersFromState(); applyState(); updateInfo();
      playing = false;
      return;
    }
    const t = (elapsed % segDuration) / segDuration;
    const a = path[segIdx];
    const b = path[segIdx + 1];
    for (const k of Object.keys(state)) {
      state[k] = a[k] + (b[k] - a[k]) * t;
    }
    syncSlidersFromState(false); // 슬라이더 라벨만 갱신 (성능)
    applyState(); updateInfo();
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
}

function syncSlidersFromState(updateInputs=true) {
  for (const k of Object.keys(state)) {
    const el = document.getElementById(k);
    const val = document.getElementById(k+'v');
    if (el) {
      if (updateInputs) el.value = state[k];
      val.textContent = (Math.round(state[k] * 10) / 10).toFixed(0) + '°';
    }
  }
}

window.addEventListener('resize', () => {
  const w = viewport.clientWidth, h = viewport.clientHeight;
  camera.aspect = w / h; camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

function tick() {
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
